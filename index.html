<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>GREED TV</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Bebas Neue',sans-serif}

/* ── Stream containers ── */
#viewer{display:none;width:100vw;height:100vh}
#viewer iframe{border:none;display:block}

/* 2 streams: side by side */
#viewer.two{display:flex;flex-direction:row}
#viewer.two iframe{width:50%;height:100%}

/* 3 streams: 2 top + 1 bottom */
#viewer.three{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:60vh 40vh}
#viewer.three iframe:nth-child(3){grid-column:1/3}

/* ── Setup form ── */
#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100vw;height:100vh;gap:16px}
#setup input{width:260px;padding:10px 14px;font-size:16px;border:1px solid #333;border-radius:4px;background:#111;color:#fff;font-family:'Bebas Neue',sans-serif;letter-spacing:1px}
#setup input::placeholder{color:#555}
#setup button{width:260px;padding:12px;font-size:20px;letter-spacing:2px;border:none;border-radius:4px;background:#c9a84c;color:#000;font-family:'Bebas Neue',sans-serif;cursor:pointer}
#setup button:hover{background:#d4b65c}
</style>
</head>
<body>

<div id="setup">
  <input id="s1" type="text" placeholder="Stream 1">
  <input id="s2" type="text" placeholder="Stream 2">
  <input id="s3" type="text" placeholder="Stream 3 (optional)">
  <button onclick="launch()">Launch</button>
</div>

<div id="viewer"></div>

<script>
var PARENT = 'tlowe212.github.io';

function twitchSrc(ch) {
  return 'https://player.twitch.tv/?channel=' + encodeURIComponent(ch) +
    '&parent=' + PARENT + '&muted=true&autoplay=true';
}

function loadStreams(s1, s2, s3) {
  var v = document.getElementById('viewer');
  var setup = document.getElementById('setup');
  v.innerHTML = '';

  var streams = [s1, s2];
  if (s3) streams.push(s3);

  v.className = streams.length === 3 ? 'three' : 'two';

  for (var i = 0; i < streams.length; i++) {
    var f = document.createElement('iframe');
    f.src = twitchSrc(streams[i]);
    f.setAttribute('allowfullscreen', 'true');
    f.allow = 'autoplay; fullscreen';
    v.appendChild(f);
  }

  setup.style.display = 'none';
  v.style.display = '';
}

function launch() {
  var s1 = document.getElementById('s1').value.trim();
  var s2 = document.getElementById('s2').value.trim();
  var s3 = document.getElementById('s3').value.trim();
  if (!s1 || !s2) return;

  var params = '?s1=' + encodeURIComponent(s1) + '&s2=' + encodeURIComponent(s2);
  if (s3) params += '&s3=' + encodeURIComponent(s3);
  history.replaceState(null, '', location.pathname + params);

  loadStreams(s1, s2, s3);
}

// Auto-load from URL params
(function() {
  var p = new URLSearchParams(location.search);
  var s1 = (p.get('s1') || '').trim();
  var s2 = (p.get('s2') || '').trim();
  var s3 = (p.get('s3') || '').trim();
  if (s1 && s2) loadStreams(s1, s2, s3);
})();
</script>
</body>
</html>
